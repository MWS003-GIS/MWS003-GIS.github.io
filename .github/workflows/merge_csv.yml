name: Merge CSV Files

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 10 minutes
    
  workflow_dispatch:  # Allows manual triggering

jobs:
  merge_csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Pandas
        run: pip install pandas

      - name: Run CSV Merge Script
        run: python IWWRMP/Data/Suggestion/merge_csv.py

      - name: Configure Git user
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Check if there are changes to commit
        run: |
          git diff --exit-code || (
            git add IWWRMP/Data/Suggestion/suggestion.csv &&
            git commit -m "Merged CSV files"
          )

      - name: Push changes to repository
        env:
          GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        run: |
          git remote set-url origin https://x-access-token:${{ secrets.PERSONAL_ACCESS_TOKEN }}@github.com/MWS003-GIS/MWS003-GIS.github.io.git
          git push

