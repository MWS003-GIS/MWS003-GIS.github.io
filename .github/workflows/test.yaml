name: Test Workflow

on:
  push:
    branches:
      - main

      - name: test
        run: |
          python - <<EOF
          import pandas as pd

          # File paths
          file1 = "IWWRMP/Data/Suggestion/suggestion.csv"
          file2 = "IWWRMP/Data/Suggestion/suggestion_1740385928803.csv"
          output_file = "IWWRMP/Data/Suggestion/suggestion.csv"

          # Load CSVs
          df1 = pd.read_csv(file1)
          df2 = pd.read_csv(file2)

          # Merge and remove duplicates
          merged_df = pd.concat([df1, df2]).drop_duplicates()

          # Save merged CSV
          merged_df.to_csv(output_file, index=False)

          print("Merged CSV saved successfully!")
          EOF
